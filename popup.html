<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>마비노기 모바일 쿠폰</h1>

  <section>
    <label for="profileSelect">저장된 계정</label>
    <select id="profileSelect">
      <option value="">계정을 추가하세요</option>
    </select>

    <div class="btn-row order-row">
      <button id="moveUp" type="button" class="secondary" disabled>▲ 위로</button>
      <button id="moveDown" type="button" class="secondary" disabled>▼ 아래로</button>
      <button id="setDefault" type="button" class="secondary" disabled>★ 기본</button>
    </div>
    <p class="hint order-hint">★ 기본 계정이 쿠폰 페이지에 자동 입력됩니다.</p>

    <label for="nickname">별명</label>
    <input id="nickname" type="text" maxlength="20" placeholder="예: 본캐, 부캐1" autocomplete="off">

    <label for="npaCode">회원코드 (NPA_CODE)</label>
    <input id="npaCode" type="text" maxlength="13" placeholder="게임 설정 > 계정에서 확인" autocomplete="off" spellcheck="false">
    <p class="hint">별명으로 계정을 구분해 저장합니다. 회원코드는 12~13자 영문/숫자입니다.</p>

    <div class="btn-row three">
      <button id="newProfile" type="button" class="secondary">새 계정</button>
      <button id="saveProfile" type="button" class="secondary">추가</button>
      <button id="deleteProfile" type="button" class="danger" disabled>삭제</button>
    </div>
  </section>

  <section>
    <label for="coupon">쿠폰번호</label>
    <input id="coupon" type="text" maxlength="42" placeholder="쿠폰번호 입력" autocomplete="off" spellcheck="false">
    <label class="checkbox">
      <input id="autoSelectChar" type="checkbox">
      캐릭터 1명이면 자동 선택
    </label>
    <button id="apply" type="button" class="primary">페이지에 적용 및 조회</button>
  </section>

  <p id="status" class="status" aria-live="polite"></p>

  <script src="popup.js"></script>
</body>
</html>
